          - list [ref=e303]:
            - listitem [ref=e304]: Virtual joysticks for movement and camera
            - listitem [ref=e305]: Touch-optimized UI with larger interaction areas
            - listitem [ref=e306]: Responsive layout for skill collection popups
          - heading "Design Decisions and Trade-offs" [level=2] [ref=e307]:
            - img [ref=e309] [cursor=pointer]
            - text: Design Decisions and Trade-offs
          - heading "Why Custom Voxel Engine Instead of Three.js/Babylon Built-ins?" [level=3] [ref=e312]:
            - img [ref=e314] [cursor=pointer]
            - text: Why Custom Voxel Engine Instead of Three.js/Babylon Built-ins?
          - paragraph [ref=e317]: I needed precise control over meshing and chunk streaming. While Babylon.js provides the WebGL rendering layer, the voxel system, greedy meshing, and world generation are custom implementations optimized for this specific use case.
          - heading "Why No Persistence?" [level=3] [ref=e318]:
            - img [ref=e320] [cursor=pointer]
            - text: Why No Persistence?
          - paragraph [ref=e323]: "Each page refresh starts a fresh game. This was a deliberate choice:"
          - list [ref=e324]:
            - listitem [ref=e325]: Keeps the codebase simpler (no localStorage/backend)
            - listitem [ref=e326]: Encourages exploration rather than checkbox completion
            - listitem [ref=e327]: Makes testing easier during development
            - listitem [ref=e328]: Visitors can experience the full city each visit
          - paragraph [ref=e329]: If I were building this for actual gameplay, I'd add localStorage persistence and maybe even a backend for global leaderboards.
          - heading "Why Babylon.js Over Three.js?" [level=3] [ref=e330]:
            - img [ref=e332] [cursor=pointer]
            - text: Why Babylon.js Over Three.js?
          - paragraph [ref=e335]: "Both are excellent, but I chose Babylon.js because:"
          - list [ref=e336]:
            - listitem [ref=e337]:
              - strong [ref=e338]: Better TypeScript support
              - text: "- Built with TypeScript from the ground up"
            - listitem [ref=e339]:
              - strong [ref=e340]: Comprehensive scene graph
              - text: "- Easier to manage complex 3D scenes"
            - listitem [ref=e341]:
              - strong [ref=e342]: Built-in post-processing
              - text: "- Bloom, grain, chromatic aberration out of the box"
            - listitem [ref=e343]:
              - strong [ref=e344]: Excellent documentation
              - text: "- Clear examples and playground"
          - heading "Entity System Simplicity" [level=3] [ref=e345]:
            - img [ref=e347] [cursor=pointer]
            - text: Entity System Simplicity
          - paragraph [ref=e350]: Traffic, pedestrians, and drones use simple path-following logic rather than full ECS (Entity Component System) architecture. For this scale (dozens of entities), simple update loops are more maintainable than adding framework complexity.
          - heading "Development Experience" [level=2] [ref=e351]:
            - img [ref=e353] [cursor=pointer]
            - text: Development Experience
          - paragraph [ref=e356]:
            - text: The project includes a
            - code [ref=e357]: "`CLAUDE.md`"
            - text: "file with detailed guidance for AI-assisted development, covering:"
          - list [ref=e358]:
            - listitem [ref=e359]: Architecture overview and system boundaries
            - listitem [ref=e360]: Development commands and build process
            - listitem [ref=e361]: Important patterns (voxel types, chunk system, color values)
            - listitem [ref=e362]: File organization and where to make changes
          - paragraph [ref=e363]: This makes it easy to extend the game with new features, voxel types, or visual effects.
          - heading "What I Learned" [level=2] [ref=e364]:
            - img [ref=e366] [cursor=pointer]
            - text: What I Learned
          - paragraph [ref=e369]: "Building this project taught me about:"
          - list [ref=e370]:
            - listitem [ref=e371]:
              - strong [ref=e372]: Voxel optimization techniques
              - text: "- Greedy meshing is fascinating and challenging to implement correctly"
            - listitem [ref=e373]:
              - strong [ref=e374]: Procedural generation
              - text: "- Balancing randomness with structure to create believable cities"
            - listitem [ref=e375]:
              - strong [ref=e376]: WebGL performance
              - text: "- Understanding draw calls, vertex buffers, and GPU limits"
            - listitem [ref=e377]:
              - strong [ref=e378]: Post-processing pipelines
              - text: "- How bloom, grain, and chromatic aberration create atmosphere"
            - listitem [ref=e379]:
              - strong [ref=e380]: Chunk streaming systems
              - text: "- Spatial hashing, view frustum culling, dynamic loading"
            - listitem [ref=e381]:
              - strong [ref=e382]: Mobile browser limitations
              - text: "- Performance constraints, touch event handling, virtual controls"
          - paragraph [ref=e383]: The biggest surprise? How much performance matters in the browser. I spent as much time profiling and optimizing as I did building features. The greedy meshing implementation alone took three iterations to get right.
