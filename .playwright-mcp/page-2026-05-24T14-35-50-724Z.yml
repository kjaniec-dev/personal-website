            - generic [ref=e99]: "\"preview\": \"vite preview\""
            - generic [ref=e100]: "},"
            - generic [ref=e101]: "\"dependencies\": {"
            - generic [ref=e102]: "\"@babylonjs/core\": \"^7.0.0\","
            - generic [ref=e103]: "\"@babylonjs/loaders\": \"^7.0.0\","
            - generic [ref=e104]: "\"@babylonjs/materials\": \"^7.0.0\""
            - generic [ref=e105]: "},"
            - generic [ref=e106]: "\"devDependencies\": {"
