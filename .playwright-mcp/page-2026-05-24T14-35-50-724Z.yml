            - text: What is This?
          - paragraph [ref=e44]: This is an interactive resume disguised as a browser-based game. Instead of reading a traditional CV, visitors explore a sprawling cyberpunk city rendered entirely from voxels (3D pixels), discovering skill boxes that represent my technical expertise. Think Minecraft meets Blade Runner, but it runs in your browser without any downloads or plugins.
          - heading "The Challenge" [level=2] [ref=e45]:
            - img [ref=e47] [cursor=pointer]
            - text: The Challenge
          - paragraph [ref=e50]: "Traditional resumes are static and boring. Portfolio websites can be engaging, but they're still just pages you scroll through. I wanted to create something memorable - an experience that would:"
          - list [ref=e51]:
            - listitem [ref=e52]: Stand out from typical developer portfolios
            - listitem [ref=e53]: Demonstrate technical skills through the medium itself
            - listitem [ref=e54]: Run smoothly in any modern browser without installation
            - listitem [ref=e55]: Handle large-scale procedural world generation efficiently
            - listitem [ref=e56]: Create an immersive cyberpunk atmosphere with dynamic lighting and effects
            - listitem [ref=e57]: Work on both desktop and mobile devices
          - heading "Project Overview" [level=2] [ref=e58]:
            - img [ref=e60] [cursor=pointer]
            - text: Project Overview
          - paragraph [ref=e63]:
            - text: You can experience the live application at
            - link "3dresume.kjaniec.dev" [ref=e64] [cursor=pointer]:
              - /url: https://3dresume.kjaniec.dev
            - text: . The game is a fully interactive 3D world built with WebGL, featuring a streaming chunk system that can render cities spanning thousands of blocks.
          - img "Cyberpunk Voxel City Resume Game" [ref=e66]
          - heading "Technical Architecture" [level=2] [ref=e67]:
            - img [ref=e69] [cursor=pointer]
            - text: Technical Architecture
          - heading "Core Technology Stack" [level=3] [ref=e72]:
            - img [ref=e74] [cursor=pointer]
            - text: Core Technology Stack
          - paragraph [ref=e77]: "The game is built with:"
          - list [ref=e78]:
            - listitem [ref=e79]:
              - strong [ref=e80]: Babylon.js 7
              - text: "- Powerful WebGL rendering engine with excellent TypeScript support"
            - listitem [ref=e81]:
              - strong [ref=e82]: TypeScript 5
              - text: "- Type-safe game logic and world generation"
            - listitem [ref=e83]:
              - strong [ref=e84]: Vite
              - text: "- Lightning-fast dev server and optimized production builds"
            - listitem [ref=e85]:
              - strong [ref=e86]: Custom voxel engine
              - text: "- Chunk-based streaming world with greedy meshing optimization"
          - paragraph [ref=e87]: "Here's the complete dependency setup:"
          - code [ref=e90]:
            - generic [ref=e91]: "{"
            - generic [ref=e92]: "\"name\": \"cyberpunk-resume-game\","
            - generic [ref=e93]: "\"private\": true,"
            - generic [ref=e94]: "\"version\": \"1.0.0\","
