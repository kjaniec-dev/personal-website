          - heading "Performance Optimizations" [level=2] [ref=e254]:
            - img [ref=e256] [cursor=pointer]
            - text: Performance Optimizations
          - heading "Greedy Meshing" [level=3] [ref=e259]:
            - img [ref=e261] [cursor=pointer]
            - text: Greedy Meshing
          - paragraph [ref=e264]: The single biggest optimization - reduces polygon count from ~6 million to ~300k triangles for a typical view.
          - heading "Chunk Culling" [level=3] [ref=e265]:
            - img [ref=e267] [cursor=pointer]
            - text: Chunk Culling
          - paragraph [ref=e270]: Only chunks within view distance are loaded and meshed, keeping memory usage reasonable.
          - heading "Vendor Code Splitting" [level=3] [ref=e271]:
            - img [ref=e273] [cursor=pointer]
            - text: Vendor Code Splitting
          - paragraph [ref=e276]: Vite configuration separates Babylon.js (~2MB) into a separate chunk for better caching and faster incremental builds.
          - heading "Material Reuse" [level=3] [ref=e277]:
            - img [ref=e279] [cursor=pointer]
            - text: Material Reuse
          - paragraph [ref=e282]: Single standard material for all voxels, with vertex colors determining appearance - eliminates material switching overhead.
