              - text: "(Gold): CI/CD, Git, Terminal"
          - paragraph [ref=e200]: "Each skill is a floating, rotating voxel box with an emissive glow. When collected:"
          - list [ref=e201]:
            - listitem [ref=e202]: The voxel type changes from glowing to muted (+18 type offset)
            - listitem [ref=e203]: The chunk is refreshed to update the mesh
            - listitem [ref=e204]: A popup displays skill details
            - listitem [ref=e205]: The HUD counter updates
            - listitem [ref=e206]: Progress is tracked (but not persisted - each session is fresh)
          - heading "Visual Effects Pipeline" [level=2] [ref=e207]:
