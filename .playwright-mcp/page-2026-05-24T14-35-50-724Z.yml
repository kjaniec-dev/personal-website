            - generic [ref=e108]: "\"vite\": \"^5.4.0\""
            - generic [ref=e109]: "}"
            - generic [ref=e110]: "}"
          - paragraph [ref=e111]: The minimal dependency footprint keeps the build fast and the bundle size reasonable. The entire game, including Babylon.js, compiles to a 5.2MB distribution package (under 1.5MB gzipped).
          - heading "The Voxel Engine" [level=3] [ref=e112]:
            - img [ref=e114] [cursor=pointer]
            - text: The Voxel Engine
          - paragraph [ref=e117]: "At the heart of the game is a custom voxel rendering system designed for performance:"
          - heading "125+ Voxel Types" [level=4] [ref=e118]:
            - img [ref=e120] [cursor=pointer]
            - text: 125+ Voxel Types
          - paragraph [ref=e123]: "The game defines 125+ distinct voxel types spanning:"
          - list [ref=e124]:
            - listitem [ref=e125]:
              - strong [ref=e126]: Terrain & Infrastructure
              - text: ": Roads, sidewalks, concrete, water, sand"
            - listitem [ref=e127]:
              - strong [ref=e128]: Building Materials
              - text: ": Various glass types, metals, bricks, weathered concrete"
            - listitem [ref=e129]:
              - strong [ref=e130]: Cyberpunk Elements
              - text: ": Neon signs (pink, cyan, orange, purple, green), hologram projections"
            - listitem [ref=e131]:
              - strong [ref=e132]: Urban Details
              - text: ": Street lamps, traffic lights, AC units, satellite dishes, steam vents"
            - listitem [ref=e133]:
              - strong [ref=e134]: Port Structures
              - text: ": Shipping containers, corrugated metal, industrial materials"
            - listitem [ref=e135]:
              - strong [ref=e136]: Skill Boxes
              - text: ": 18 glowing collectible skills + 18 muted \"collected\" variants"
          - paragraph [ref=e137]: Each voxel type has an RGB color value, with values >1.0 creating emissive glow for the bloom post-processing effect.
          - heading "Greedy Meshing Algorithm" [level=4] [ref=e138]:
            - img [ref=e140] [cursor=pointer]
            - text: Greedy Meshing Algorithm
          - paragraph [ref=e143]: "Instead of rendering each voxel as 6 separate faces (which would create millions of triangles), I implemented a greedy meshing algorithm that:"
          - list [ref=e144]:
            - listitem [ref=e145]: Scans each layer of voxels in a chunk
            - listitem [ref=e146]: Groups adjacent voxels of the same type into larger quads
            - listitem [ref=e147]: Only renders visible faces (culling faces between solid blocks)
            - listitem [ref=e148]: Reduces triangle count by 80-95% compared to naive voxel rendering
          - paragraph [ref=e149]: This optimization is critical for maintaining 60 FPS while rendering a city with hundreds of buildings.
          - heading "Chunk-Based Streaming" [level=4] [ref=e150]:
            - img [ref=e152] [cursor=pointer]
            - text: Chunk-Based Streaming
          - paragraph [ref=e155]:
            - text: The world is divided into 16x16x16 voxel chunks. The
            - code [ref=e156]: "`ChunkManager`"
            - text: ":"
          - list [ref=e157]:
            - listitem [ref=e158]: "Loads chunks within viewing distance (default: 4 chunks = 64 blocks radius)"
            - listitem [ref=e159]: Unloads distant chunks to conserve memory
            - listitem [ref=e160]:
              - text: Uses spatial hashing with
              - code [ref=e161]: "`\"chunkX,chunkZ\"`"
              - text: keys for O(1) chunk lookup
            - listitem [ref=e162]: Refreshes individual chunks when skills are collected (removes glow effect)
          - heading "Procedural City Generation" [level=3] [ref=e163]:
            - img [ref=e165] [cursor=pointer]
            - text: Procedural City Generation
          - paragraph [ref=e168]:
            - text: The city layout uses a
            - strong [ref=e169]: distance-based concentric zone system
            - text: "from the city center:"
          - code [ref=e172]:
            - generic [ref=e173]: // Zone allocation based on distance from origin
            - generic [ref=e174]: "Core Districts (0-15 blocks): Entertainment, Neon Market, Retail"
            - generic [ref=e175]: "Mid-City (15-30 blocks): Corporate Plaza, Commercial District"
            - generic [ref=e176]: "Residential (30-55 blocks): High-rise and mid-rise apartments"
            - generic [ref=e177]: "Suburban (55-70 blocks): Markets, tech shops, parking lots"
            - generic [ref=e178]: "Industrial (near water): Port structures, container stacks"
            - generic [ref=e179]: "Boundaries (70+ blocks): City walls, wasteland, void"
          - paragraph [ref=e180]: Building heights, densities, and architectural styles vary by zone, creating a believable urban landscape. The procedural generation ensures the city is different every time while maintaining coherent districts.
          - heading "Skill Collection System" [level=3] [ref=e181]:
            - img [ref=e183] [cursor=pointer]
            - text: Skill Collection System
          - paragraph [ref=e186]: "The game features 18 collectible skills organized into 6 categories:"
          - list [ref=e187]:
            - listitem [ref=e188]:
              - strong [ref=e189]: Neural Core
              - text: "(Cyan): Java, Python, Node.js"
            - listitem [ref=e190]:
              - strong [ref=e191]: Interface Deck
